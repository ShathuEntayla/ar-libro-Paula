<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR del libro</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; }
    #overlay {
      position:fixed; top:0; left:0; width:100%; padding:10px;
      text-align:center; font-family:sans-serif; color:#fff;
      background:rgba(0,0,0,0.4); z-index:999;
    }
    #debugLog {
      position:fixed; bottom:0; left:0; width:100%; max-height:35%;
      overflow-y:auto; font-family:monospace; font-size:11px; color:#0f0;
      background:rgba(0,0,0,0.75); z-index:999; padding:6px; box-sizing:border-box;
    }
    #debugLog div { white-space:pre-wrap; border-bottom:1px solid #333; padding:2px 0; }
    #debugLog .err { color:#f55; }
  </style>
</head>
<body>
  <div id="overlay">Apunta la cámara a una página del libro</div>
  <div id="debugLog"></div>

  <!--
    targets.mind = archivo compilado con TODAS las imágenes de las páginas.
    Cada <a-entity mindar-image-target targetIndex="N"> = una página.
    targetIndex sigue el orden en que subiste las imágenes al compilador.
  -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets/targets.mind; autoStart: true; uiScanning: yes;"
    color-space="sRGB"
    embedded
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >
    <a-assets>
      <!--
        src puede ser:
        - un archivo local: ./videos/clip0.mp4
        - un enlace directo de archive.org: https://archive.org/download/tuitem/clip0.mp4
        muted="true" es obligatorio para que el autoplay funcione sin tocar la pantalla.
      -->
      <video id="clip0" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/01_mar25.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip1" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/02_may25.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip2" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/03_jul25.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip3" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/04_ago25.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip4" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/05_sep25.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip5" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/06_oruga.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip6" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/07_oct25.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip7" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/08a_dic25_cumpleShathu.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip8" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/08b_dic25_burgohondo.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip9" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/09_ene26.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip10" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/10_burgohondo_red.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="clip11" src="https://pub-dfe4381c6e4b4d90a251472f2640923c.r2.dev/11_feb26.mp4" preload="auto" loop="false" muted="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <!-- Página 0 -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#clip0" width="0.831" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 1 -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-video src="#clip1" width="0.667" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 2 -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-video src="#clip2" width="0.5625" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 3 -->
    <a-entity mindar-image-target="targetIndex: 3">
      <a-video src="#clip3" width="1" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 4 -->
    <a-entity mindar-image-target="targetIndex: 4">
      <a-video src="#clip4" width="1" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 5 -->
    <a-entity mindar-image-target="targetIndex: 5">
      <a-video src="#clip5" width="0.667" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 6 -->
    <a-entity mindar-image-target="targetIndex: 6">
      <a-video src="#clip6" width="1" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 7 -->
    <a-entity mindar-image-target="targetIndex: 7">
      <a-video src="#clip7" width="1" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 8 -->
    <a-entity mindar-image-target="targetIndex: 8">
      <a-video src="#clip8" width="1" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 9 -->
    <a-entity mindar-image-target="targetIndex: 9">
      <a-video src="#clip9" width="1" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 10 -->
    <a-entity mindar-image-target="targetIndex: 10">
      <a-video src="#clip10" width="1" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>

    <!-- Página 11 (sin vídeo asignado) -->
    <a-entity mindar-image-target="targetIndex: 11">
      <a-video src="#clip11" width="0.5625" height="1" position="0 0 0.3" rotation="90 0 0"></a-video>
    </a-entity>
  </a-scene>

  <button id="unmuteBtn" style="
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      z-index:999; padding:10px 18px; border:none; border-radius:20px;
      background:#fff; font-family:sans-serif; font-size:14px; display:none;">
    🔊 Activar sonido
  </button>

  <script>
    // ---- DEBUG LOG ----
    const debugLog = document.getElementById('debugLog');
    function log(msg, isErr) {
      const line = document.createElement('div');
      if (isErr) line.className = 'err';
      const t = new Date().toLocaleTimeString();
      line.textContent = `[${t}] ${msg}`;
      debugLog.appendChild(line);
      debugLog.scrollTop = debugLog.scrollHeight;
      console.log(msg);
    }
    window.addEventListener('error', (e) => log('window error: ' + e.message, true));

    let activeVideo = null;
    const unmuteBtn = document.getElementById('unmuteBtn');

    document.addEventListener('DOMContentLoaded', () => {
      log('DOM cargado, esperando a-scene...');

      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener('loaded', () => log('a-scene loaded (A-Frame listo)'));
      sceneEl.addEventListener('arReady', () => log('MindAR listo (arReady)'));
      sceneEl.addEventListener('arError', (e) => log('arError: ' + JSON.stringify(e.detail), true));

      // Comprobar carga de cada vídeo
      document.querySelectorAll('a-assets video').forEach((v) => {
        v.addEventListener('loadeddata', () => log(`vídeo OK: ${v.id} (${v.src})`));
        v.addEventListener('error', () => log(`ERROR cargando vídeo: ${v.id} (${v.src})`, true));
      });

      document.querySelectorAll('[mindar-image-target]').forEach((entity, i) => {
        const video = entity.querySelector('a-video');
        entity.addEventListener('targetFound', () => {
          log(`targetFound: página/index ${i}`);
          if (video) {
            const el = video.components.material.material.map.image;
            el.muted = true; // arranca solo, en silencio
            activeVideo = el;
            unmuteBtn.style.display = 'block';

            const tryPlay = () => {
              el.currentTime = 0;
              el.play().catch(err => log('play() falló: ' + err, true));
            };

            if (el.readyState >= 2) {
              // ya tiene datos suficientes, reproducir directo
              tryPlay();
            } else {
              // recargar y esperar a que esté listo (buffer perdido por inactividad/red lenta)
              log(`recargando ${el.id} (readyState=${el.readyState})...`);
              el.load();
              const onCanPlay = () => {
                el.removeEventListener('canplay', onCanPlay);
                tryPlay();
              };
              el.addEventListener('canplay', onCanPlay);
              el.addEventListener('error', () => {
                log(`ERROR recargando ${el.id}: ${el.error ? el.error.message : 'desconocido'}`, true);
              }, { once: true });
            }
          }
        });
        entity.addEventListener('targetLost', () => {
          log(`targetLost: página/index ${i}`);
          if (video) {
            const el = video.components.material.material.map.image;
            el.pause();
            unmuteBtn.style.display = 'none';
          }
        });
      });
    });

    unmuteBtn.addEventListener('click', () => {
      if (activeVideo) {
        activeVideo.muted = false;
        unmuteBtn.style.display = 'none';
      }
    });
  </script>
</body>
</html>
